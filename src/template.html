<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="city-current">
        <div class="city">Longmont</div>
        <div class="current-temp">30°</div>
      </div>
      <div class="current-conditions">
        <div class="conditions">Clear</div>
        <div class="temp-high-low">
          <div class="high">High: 32°</div>
          <div class="low">Low: 19°</div>
        </div>
        <div class="wind-speed">Wind: 12mph</div>
        <div class="wind-gusts">Gusts: 20mph</div>
      </div>
    </div>
  </body>
</html>
